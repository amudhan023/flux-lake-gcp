version: "3.9"

networks:
  pipeline-net:
    driver: bridge

volumes:
  kafka-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:

services:
  spark-master:
    image: bitnami/spark:3.5
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - STORAGE_BACKEND=gcs
      - GCS_BUCKET=${GCS_BUCKET:-data-lake}
      - GCS_EMULATOR_HOST=fake-gcs-server:4443
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./src:/app/src
      - ./config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-worker-1:
    image: bitnami/spark:3.5
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_EXECUTOR_MEMORY:-4g}
      - SPARK_WORKER_CORES=${SPARK_EXECUTOR_CORES:-2}
      - STORAGE_BACKEND=gcs
      - GCS_BUCKET=${GCS_BUCKET:-data-lake}
      - GCS_EMULATOR_HOST=fake-gcs-server:4443
    ports:
      - "8081:8081"
    volumes:
      - ./src:/app/src
      - ./config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
    networks:
      - pipeline-net
    depends_on:
      - spark-master

  # ─── fake-gcs-server (local GCS emulator) ────────────────────────────────────
  fake-gcs-server:
    image: fsouza/fake-gcs-server:latest
    container_name: fake-gcs-server
    command: ["-scheme", "http", "-port", "4443", "-backend", "memory"]
    ports:
      - "4443:4443"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4443/storage/v1/b"]
      interval: 10s
      timeout: 5s
      retries: 5

  fake-gcs-init:
    image: curlimages/curl:latest
    container_name: fake-gcs-init
    depends_on:
      fake-gcs-server:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      curl -sf -X POST http://fake-gcs-server:4443/storage/v1/b
        -H 'Content-Type: application/json'
        -d '{\"name\":\"${GCS_BUCKET:-data-lake\"}' &&
      echo 'GCS bucket ready'
      "
    networks:
      - pipeline-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - pipeline-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: ${KAFKA_PARTITIONS:-12}
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - pipeline-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - pipeline-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    networks:
      - pipeline-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - pipeline-net
