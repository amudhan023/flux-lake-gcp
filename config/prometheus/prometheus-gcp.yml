# Prometheus configuration for GCP deployment.
# MinIO scrape target is removed; GCS does not expose Prometheus metrics.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "fluxlake-api"
    static_configs:
      - targets: ["fluxlake-api:8000"]
    metrics_path: /metrics

  - job_name: "spark-master"
    static_configs:
      - targets: ["spark-master:4040"]
    metrics_path: /metrics/json
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka:9308"]
