# Spark configuration for Google Cloud Platform deployment.
# Mount this file at /opt/bitnami/spark/conf/spark-defaults.conf
# in place of spark-defaults.conf when deploying to GCP.

# Delta Lake
spark.sql.extensions                    io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog         org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.databricks.delta.retentionDurationCheck.enabled false

# Google Cloud Storage connector
spark.hadoop.fs.gs.impl                 com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem
spark.hadoop.fs.AbstractFileSystem.gs.impl com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS
# ADC (Application Default Credentials) is used automatically on GCE/GKE.
# To use a service account key file instead, set:
#   spark.hadoop.google.cloud.auth.service.account.enable true
#   spark.hadoop.google.cloud.auth.service.account.json.keyfile /etc/gcp/sa-key.json

# Adaptive Query Execution
spark.sql.adaptive.enabled              true
spark.sql.adaptive.coalescePartitions.enabled true
spark.sql.adaptive.skewJoin.enabled     true

# Broadcast joins
spark.sql.autoBroadcastJoinThreshold    10m

# Serialization
spark.serializer                        org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max         512m

# Memory
spark.sql.shuffle.partitions            200
spark.default.parallelism               200
spark.memory.fraction                   0.8
spark.memory.storageFraction            0.3

# Dynamic allocation — enable on GKE with the Spark Operator
spark.dynamicAllocation.enabled         false

# Event log — writes Spark history to GCS (set GCS_BUCKET env before starting)
spark.eventLog.enabled                  true
spark.eventLog.dir                      gs://${GCS_BUCKET}/spark-events
