version: "3.9"

networks:
  pipeline-net:
    driver: bridge

volumes:
  kafka-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:

x-spark-common: &spark-common
  image: bitnami/spark:3.5
  environment:
    - SPARK_MODE=worker
    - SPARK_MASTER_URL=spark://spark-master:7077
    - SPARK_WORKER_MEMORY=${SPARK_EXECUTOR_MEMORY:-4g}
    - SPARK_WORKER_CORES=${SPARK_EXECUTOR_CORES:-2}
    - STORAGE_BACKEND=gcs
    - GCS_BUCKET=${GCS_BUCKET:-data-lake}
    - GCS_EMULATOR_HOST=fake-gcs-server:4443
  volumes:
    - ./src:/app/src
    - ./config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
  networks:
    - pipeline-net
  depends_on:
    - spark-master

services:
  # ─── Spark ───────────────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - STORAGE_BACKEND=gcs
      - GCS_BUCKET=${GCS_BUCKET:-data-lake}
      - GCS_EMULATOR_HOST=fake-gcs-server:4443
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./src:/app/src
      - ./config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-worker-1:
    <<: *spark-common
    container_name: spark-worker-1
    ports:
      - "8081:8081"

  spark-worker-2:
    <<: *spark-common
    container_name: spark-worker-2
    ports:
      - "8082:8082"

  # ─── fake-gcs-server (local GCS emulator) ────────────────────────────────────
  fake-gcs-server:
    image: fsouza/fake-gcs-server:latest
    container_name: fake-gcs-server
    command: ["-scheme", "http", "-port", "4443", "-backend", "memory"]
    ports:
      - "4443:4443"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4443/storage/v1/b"]
      interval: 10s
      timeout: 5s
      retries: 5

  fake-gcs-init:
    image: curlimages/curl:latest
    container_name: fake-gcs-init
    depends_on:
      fake-gcs-server:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      curl -sf -X POST http://fake-gcs-server:4443/storage/v1/b
        -H 'Content-Type: application/json'
        -d '{\"name\":\"${GCS_BUCKET:-data-lake\"}' &&
      echo 'GCS bucket ready'
      "
    networks:
      - pipeline-net

  # ─── Kafka ───────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: ${KAFKA_PARTITIONS:-12}
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    networks:
      - pipeline-net

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - pipeline-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_PROVISIONING_PATH: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    networks:
      - pipeline-net

  # ─── OpenTelemetry ───────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    volumes:
      - ./config/otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    networks:
      - pipeline-net
    depends_on:
      - jaeger
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14317:4317"
    networks:
      - pipeline-net

  # ─── ELK Stack ───────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./config/logstash/pipeline.conf:/usr/share/logstash/pipeline/pipeline.conf
    ports:
      - "5044:5044"
    networks:
      - pipeline-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - pipeline-net

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: filebeat
    user: root
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LOGSTASH_HOST: logstash:5044
    networks:
      - pipeline-net
    depends_on:
      - logstash

  # ─── Pipeline API ─────────────────────────────────────────────────────────────
  pipeline-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pipeline-api
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - STORAGE_BACKEND=gcs
      - GCS_BUCKET=${GCS_BUCKET:-data-lake}
      - GCS_EMULATOR_HOST=fake-gcs-server:4443
      - CHECKPOINT_BASE=gs://${GCS_BUCKET:-data-lake}/checkpoints
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PROMETHEUS_ENDPOINT=http://prometheus:9090
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ENABLE_DELTA_OPTIMIZE=${ENABLE_DELTA_OPTIMIZE:-true}
      - ENABLE_ZORDER=${ENABLE_ZORDER:-true}
      - ENABLE_AQE=${ENABLE_AQE:-true}
      - ENABLE_BROADCAST_JOINS=${ENABLE_BROADCAST_JOINS:-true}
      - ENABLE_INCREMENTAL_GOLD=${ENABLE_INCREMENTAL_GOLD:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
    depends_on:
      - spark-master
      - fake-gcs-server
      - kafka
    networks:
      - pipeline-net
